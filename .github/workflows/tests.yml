name: tests

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run lightweight tests
        run: python -m pytest
